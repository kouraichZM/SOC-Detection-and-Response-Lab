<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>SOC Home Lab Network Topology</title>
  <desc>Kali Linux attacker at 192.168.100.54 sends attack traffic into the 192.168.100.0/24 internal lab network, which contains Domain Controller (.10), Windows 10 client (.50), Linux Web server (.30), and Splunk SIEM (.51).</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; }
      .th { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .ts { font-size: 12px; font-weight: 400; fill: #555; }
      .label-legend { font-size: 11px; fill: #555; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="420" fill="#ffffff"/>

  <!-- Kali attacker node (coral) -->
  <rect x="240" y="20" width="200" height="60" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="340" y="44" text-anchor="middle" fill="#711B13">Kali Linux attacker</text>
  <text class="ts" x="340" y="64" text-anchor="middle" fill="#993C1D">192.168.100.54</text>

  <!-- Attack traffic arrow -->
  <line x1="340" y1="80" x2="340" y2="148" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="356" y="120" dominant-baseline="central" fill="#993C1D">Attack traffic</text>

  <!-- Internal network container (gray) -->
  <rect x="40" y="150" width="600" height="60" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" x="340" y="172" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">192.168.100.0/24 — Internal lab network</text>
  <text class="ts" x="340" y="192" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Host-only network (VirtualBox)</text>

  <!-- Vertical lines from network bar to nodes -->
  <line x1="110" y1="210" x2="110" y2="270" stroke="#888780" stroke-width="0.5"/>
  <line x1="258" y1="210" x2="258" y2="270" stroke="#888780" stroke-width="0.5"/>
  <line x1="422" y1="210" x2="422" y2="270" stroke="#888780" stroke-width="0.5"/>
  <line x1="570" y1="210" x2="570" y2="270" stroke="#888780" stroke-width="0.5"/>

  <!-- Domain Controller (blue) -->
  <rect x="40" y="270" width="140" height="60" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="110" y="292" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Domain Controller</text>
  <text class="ts" x="110" y="312" text-anchor="middle" dominant-baseline="central" fill="#185FA5">192.168.100.10</text>

  <!-- Windows 10 (teal) -->
  <rect x="188" y="270" width="140" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="258" y="292" text-anchor="middle" dominant-baseline="central" fill="#085041">Windows 10</text>
  <text class="ts" x="258" y="312" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">192.168.100.50</text>

  <!-- Linux Web DVWA (green) -->
  <rect x="352" y="270" width="140" height="60" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text class="th" x="422" y="292" text-anchor="middle" dominant-baseline="central" fill="#27500A">Linux web (DVWA)</text>
  <text class="ts" x="422" y="312" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">192.168.100.30</text>

  <!-- Splunk SIEM (amber) -->
  <rect x="500" y="270" width="140" height="60" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th" x="570" y="292" text-anchor="middle" dominant-baseline="central" fill="#633806">Splunk SIEM</text>
  <text class="ts" x="570" y="312" text-anchor="middle" dominant-baseline="central" fill="#854F0B">192.168.100.51</text>

  <!-- Legend -->
  <rect x="40" y="370" width="12" height="12" rx="3" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="label-legend" x="58" y="381" dominant-baseline="central">Attacker</text>
  <rect x="120" y="370" width="12" height="12" rx="3" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="label-legend" x="138" y="381" dominant-baseline="central">Windows server</text>
  <rect x="238" y="370" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="label-legend" x="256" y="381" dominant-baseline="central">Windows client</text>
  <rect x="360" y="370" width="12" height="12" rx="3" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text class="label-legend" x="378" y="381" dominant-baseline="central">Linux server</text>
  <rect x="462" y="370" width="12" height="12" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="label-legend" x="480" y="381" dominant-baseline="central">SIEM</text>
</svg>
